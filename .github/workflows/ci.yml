name: CI

on:
  pull_request:
    branches:
      - main
      - dev
  push:
    branches:
      - dev
      - phase2
      - phase2.1
      - phase2.2
      - phase2.3

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install Python
        run: uv python install 3.13

      - name: Sync backend dependencies
        run: uv sync --locked

      - name: Check lockfile
        run: uv lock --check

      - name: Compile Python sources
        run: uv run python -m compileall -q apps configs core tests

      - name: Run backend tests
        run: uv run pytest

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --cache .npm-cache --ignore-scripts

      - name: Typecheck
        run: npm run typecheck

      - name: Run frontend tests
        run: npm test

      - name: Build frontend
        run: npm run build
