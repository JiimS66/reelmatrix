# ReelMatrix — one-command deploy (frontend + backend).
# See docs/deploy-aliyun.md for the full walkthrough.
services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    env_file: .env
    environment:
      DATABASE_URL: sqlite:////app/data/reelmatrix.db
      WEB_ORIGIN: http://${PUBLIC_IP}:3000
      APP_ENV: production
    volumes:
      - ./data:/app/data          # SQLite lives here so it survives rebuilds
      - ./VERSION:/app/VERSION:ro # deploy marker (commit sha) surfaced at /health
    ports:
      - "8000:8000"
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        NEXT_PUBLIC_API_BASE_URL: http://${PUBLIC_IP}:8000
    ports:
      - "3000:3000"
    restart: unless-stopped
    depends_on:
      - api
